<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Login/Sign Up</title>
    <link rel="stylesheet" href="login_style.css">
</head>
<body>
    <div class="auth-card" id="authCard">
    <!-- Login Form -->
        <div class="box login">
            <form action="#">
                <h2>Welcome Back</h2>
                <input type="email" name="email" placeholder="Email" autocomplete="username" required>
                <input type="password" name="password" placeholder="Password" autocomplete="current-password" required>
                <button type="submit" class="btn">Sign In</button>
                <p>New here? <a href="#" onclick="toggleForm()">Create account</a></p>
            </form>
        </div>

        <!-- Signup Form -->
        <div class="box signup">
            <form action="#">
                <h2>Get Started</h2>
                <input type="text" name="fullname" placeholder="Full Name" autocomplete="name" required>
                <input type="email" name="email" placeholder="Email" autocomplete="username" required>
                <input type="password" name="password" placeholder="Password" autocomplete="new-password" required>
                <button type="submit" class="btn">Sign Up</button>
                <p>Already have an account? <a href="#" onclick="toggleForm()">Sign in</a></p>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
